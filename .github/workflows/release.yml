name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:
    inputs:
      release_version:
        description: '可选，手动指定版本号（如 1.2.3 或 v1.2.3）'
        required: false
        type: string
      force_publish:
        description: '即使同版本 Release 已有资产，仍强制重新上传'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

env:
  CI: true
  NODE_VERSION: '22'
  PNPM_VERSION: '10.27.0'

jobs:
  resolve-release:
    name: 解析发布信息
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'master'
      )
    outputs:
      should_publish: ${{ steps.resolve.outputs.should_publish }}
      skip_reason: ${{ steps.resolve.outputs.skip_reason }}
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      android_version_name: ${{ steps.resolve.outputs.android_version_name }}
      android_version_code: ${{ steps.resolve.outputs.android_version_code }}
      target_sha: ${{ steps.resolve.outputs.target_sha }}
      release_exists: ${{ steps.resolve.outputs.release_exists }}
      existing_asset_count: ${{ steps.resolve.outputs.existing_asset_count }}

    steps:
      - name: 检出目标提交
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: 解析版本与现有 Release 状态
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.release_version || '' }}
          FORCE_PUBLISH: ${{ github.event_name == 'workflow_dispatch' && inputs.force_publish || false }}
          TARGET_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
        run: |
          version_input="${INPUT_VERSION}"

          if [ -z "${version_input}" ]; then
            version_input="$(node -p "require('./apps/desktop/package.json').version")"
          fi

          if [[ "${version_input}" =~ ^v?([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            version="${major}.${minor}.${patch}"
            tag="v${version}"
            android_version_code=$((10#${major} * 10000 + 10#${minor} * 100 + 10#${patch}))
          else
            echo "版本格式无效: ${version_input}，仅支持 vX.Y.Z 或 X.Y.Z"
            exit 1
          fi

          release_exists=false
          existing_asset_count=0
          release_json=''

          if release_json="$(gh release view "${tag}" --json assets,url 2>/dev/null)"; then
            release_exists=true
            existing_asset_count="$(
              printf '%s' "${release_json}" | node -e "
                let data = '';
                process.stdin.on('data', (chunk) => {
                  data += chunk;
                });
                process.stdin.on('end', () => {
                  const parsed = JSON.parse(data);
                  process.stdout.write(String(parsed.assets.length));
                });
              "
            )"
          fi

          should_publish=true
          skip_reason=''

          if [ "${FORCE_PUBLISH}" != 'true' ] && [ "${release_exists}" = 'true' ] && [ "${existing_asset_count}" -gt 0 ]; then
            should_publish=false
            skip_reason="Release ${tag} 已存在且包含 ${existing_asset_count} 个资产，跳过自动发布。"
          fi

          {
            echo "should_publish=${should_publish}"
            echo "skip_reason=${skip_reason}"
            echo "tag=${tag}"
            echo "version=${version}"
            echo "android_version_name=${version}"
            echo "android_version_code=${android_version_code}"
            echo "target_sha=${TARGET_SHA}"
            echo "release_exists=${release_exists}"
            echo "existing_asset_count=${existing_asset_count}"
          } >> "${GITHUB_OUTPUT}"

      - name: 输出跳过原因
        if: steps.resolve.outputs.should_publish != 'true'
        run: echo "${{ steps.resolve.outputs.skip_reason }}"

  build-windows:
    name: 打包 Windows EXE
    runs-on: windows-latest
    needs: resolve-release
    if: needs.resolve-release.outputs.should_publish == 'true'
    timeout-minutes: 40

    steps:
      - name: 检出目标提交
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-release.outputs.target_sha }}

      - name: 设置 pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 设置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 准备发布版本号
        run: pnpm release:prepare-version -- ${{ needs.resolve-release.outputs.tag }}

      - name: 构建 Windows 安装包
        run: pnpm dist:win

      - name: 上传 Windows 产物
        uses: actions/upload-artifact@v7
        with:
          name: release-windows-exe
          path: |
            apps/desktop/release/**/*.exe
            apps/desktop/dist/**/*.exe
          if-no-files-found: error

  build-macos:
    name: 打包 macOS DMG
    runs-on: macos-latest
    needs: resolve-release
    if: needs.resolve-release.outputs.should_publish == 'true'
    timeout-minutes: 40

    steps:
      - name: 检出目标提交
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-release.outputs.target_sha }}

      - name: 设置 pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 设置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 准备发布版本号
        run: pnpm release:prepare-version -- ${{ needs.resolve-release.outputs.tag }}

      - name: 构建 macOS 安装包
        run: pnpm dist:mac

      - name: 上传 macOS 产物
        uses: actions/upload-artifact@v7
        with:
          name: release-macos-dmg
          path: |
            apps/desktop/release/**/*.dmg
            apps/desktop/dist/**/*.dmg
          if-no-files-found: error

  build-android:
    name: 打包 Android APK
    runs-on: ubuntu-latest
    needs: resolve-release
    if: needs.resolve-release.outputs.should_publish == 'true'
    timeout-minutes: 40
    env:
      ANDROID_VERSION_NAME: ${{ needs.resolve-release.outputs.android_version_name }}
      ANDROID_VERSION_CODE: ${{ needs.resolve-release.outputs.android_version_code }}

    steps:
      - name: 检出目标提交
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-release.outputs.target_sha }}

      - name: 设置 pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 设置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: 设置 Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 校验 Android 发布签名 secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=()
          [ -n "${ANDROID_KEYSTORE_BASE64}" ] || missing+=("ANDROID_KEYSTORE_BASE64")
          [ -n "${ANDROID_KEYSTORE_PASSWORD}" ] || missing+=("ANDROID_KEYSTORE_PASSWORD")
          [ -n "${ANDROID_KEY_ALIAS}" ] || missing+=("ANDROID_KEY_ALIAS")
          [ -n "${ANDROID_KEY_PASSWORD}" ] || missing+=("ANDROID_KEY_PASSWORD")

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "缺少 Android 发布签名 secrets: ${missing[*]}"
            exit 1
          fi

      - name: 准备 Android 发布签名
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > apps/mobile/android/app/release.keystore

      - name: 构建 Android Release APK
        env:
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/apps/mobile/android/app/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x apps/mobile/android/gradlew
          pnpm dist:android

      - name: 上传 Android 产物
        uses: actions/upload-artifact@v7
        with:
          name: release-android-apk
          path: apps/mobile/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  publish-release:
    name: 发布 GitHub Release
    runs-on: ubuntu-latest
    needs:
      - resolve-release
      - build-windows
      - build-macos
      - build-android
    if: needs.resolve-release.outputs.should_publish == 'true'
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: 下载 Windows 产物
        uses: actions/download-artifact@v8
        with:
          name: release-windows-exe
          path: release-assets/windows

      - name: 下载 macOS 产物
        uses: actions/download-artifact@v8
        with:
          name: release-macos-dmg
          path: release-assets/macos

      - name: 下载 Android 产物
        uses: actions/download-artifact@v8
        with:
          name: release-android-apk
          path: release-assets/android

      - name: 检查待发布资产
        run: |
          find release-assets -type f | sort

      - name: 创建或更新 GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.resolve-release.outputs.tag }}
          TARGET_SHA: ${{ needs.resolve-release.outputs.target_sha }}
        run: |
          shopt -s nullglob
          assets=(release-assets/windows/* release-assets/macos/* release-assets/android/*)

          if [ "${#assets[@]}" -eq 0 ]; then
            echo "未找到可发布资产"
            exit 1
          fi

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" "${assets[@]}" --clobber
            gh release edit "${TAG_NAME}" \
              --title "NetMate ${TAG_NAME}" \
              --latest
          else
            gh release create "${TAG_NAME}" "${assets[@]}" \
              --title "NetMate ${TAG_NAME}" \
              --generate-notes \
              --target "${TARGET_SHA}" \
              --latest
          fi
