name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: true
  NODE_VERSION: '22'
  PNPM_VERSION: '10.27.0'

jobs:
  validate-tag:
    name: 校验标签
    runs-on: ubuntu-latest
    outputs:
      is_semver: ${{ steps.validate.outputs.is_semver }}
      tag: ${{ steps.validate.outputs.tag }}
      version: ${{ steps.validate.outputs.version }}
      android_version_name: ${{ steps.validate.outputs.android_version_name }}
      android_version_code: ${{ steps.validate.outputs.android_version_code }}

    steps:
      - name: 严格校验 vX.Y.Z 标签
        id: validate
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [[ "${TAG_NAME}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
            VERSION_CODE=$((10#${MAJOR} * 10000 + 10#${MINOR} * 100 + 10#${PATCH}))

            {
              echo "is_semver=true"
              echo "tag=${TAG_NAME}"
              echo "version=${VERSION}"
              echo "android_version_name=${VERSION}"
              echo "android_version_code=${VERSION_CODE}"
            } >> "${GITHUB_OUTPUT}"
          else
            echo "is_semver=false" >> "${GITHUB_OUTPUT}"
            echo "tag=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
            echo "version=" >> "${GITHUB_OUTPUT}"
            echo "android_version_name=" >> "${GITHUB_OUTPUT}"
            echo "android_version_code=" >> "${GITHUB_OUTPUT}"
            echo "标签 ${TAG_NAME} 不符合 vX.Y.Z，后续发布作业将跳过。"
          fi

  quality:
    name: 发布前门禁
    runs-on: ubuntu-latest
    needs: validate-tag
    if: needs.validate-tag.outputs.is_semver == 'true'
    timeout-minutes: 25

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置 pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 设置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: TypeScript 检查
        run: pnpm type-check

      - name: 单元与组件测试
        run: pnpm test

      - name: Prettier 检查
        run: pnpm format:check

  build-windows:
    name: 打包 Windows EXE
    runs-on: windows-latest
    needs:
      - validate-tag
      - quality
    if: needs.validate-tag.outputs.is_semver == 'true'
    timeout-minutes: 40

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置 pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 设置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 准备发布版本号
        run: pnpm release:prepare-version -- ${{ needs.validate-tag.outputs.tag }}

      - name: 构建 Windows 安装包
        run: pnpm dist:win

      - name: 上传 Windows 产物
        uses: actions/upload-artifact@v7
        with:
          name: release-windows-exe
          path: |
            apps/desktop/release/**/*.exe
            apps/desktop/dist/**/*.exe
          if-no-files-found: error

  build-macos:
    name: 打包 macOS DMG
    runs-on: macos-latest
    needs:
      - validate-tag
      - quality
    if: needs.validate-tag.outputs.is_semver == 'true'
    timeout-minutes: 40

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置 pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 设置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 准备发布版本号
        run: pnpm release:prepare-version -- ${{ needs.validate-tag.outputs.tag }}

      - name: 构建 macOS 安装包
        run: pnpm dist:mac

      - name: 上传 macOS 产物
        uses: actions/upload-artifact@v7
        with:
          name: release-macos-dmg
          path: |
            apps/desktop/release/**/*.dmg
            apps/desktop/dist/**/*.dmg
          if-no-files-found: error

  build-android:
    name: 打包 Android APK
    runs-on: ubuntu-latest
    needs:
      - validate-tag
      - quality
    if: needs.validate-tag.outputs.is_semver == 'true'
    timeout-minutes: 40
    env:
      ANDROID_VERSION_NAME: ${{ needs.validate-tag.outputs.android_version_name }}
      ANDROID_VERSION_CODE: ${{ needs.validate-tag.outputs.android_version_code }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置 pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 设置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: 设置 Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 校验 Android 发布签名 secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=()
          [ -n "${ANDROID_KEYSTORE_BASE64}" ] || missing+=("ANDROID_KEYSTORE_BASE64")
          [ -n "${ANDROID_KEYSTORE_PASSWORD}" ] || missing+=("ANDROID_KEYSTORE_PASSWORD")
          [ -n "${ANDROID_KEY_ALIAS}" ] || missing+=("ANDROID_KEY_ALIAS")
          [ -n "${ANDROID_KEY_PASSWORD}" ] || missing+=("ANDROID_KEY_PASSWORD")

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "缺少 Android 发布签名 secrets: ${missing[*]}"
            exit 1
          fi

      - name: 准备 Android 发布签名
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > apps/mobile/android/app/release.keystore

      - name: 构建 Android Release APK
        env:
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/apps/mobile/android/app/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x apps/mobile/android/gradlew
          pnpm dist:android

      - name: 上传 Android 产物
        uses: actions/upload-artifact@v7
        with:
          name: release-android-apk
          path: apps/mobile/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  publish-release:
    name: 发布 GitHub Release
    runs-on: ubuntu-latest
    needs:
      - validate-tag
      - build-windows
      - build-macos
      - build-android
    if: needs.validate-tag.outputs.is_semver == 'true'
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: 下载 Windows 产物
        uses: actions/download-artifact@v8
        with:
          name: release-windows-exe
          path: release-assets/windows

      - name: 下载 macOS 产物
        uses: actions/download-artifact@v8
        with:
          name: release-macos-dmg
          path: release-assets/macos

      - name: 下载 Android 产物
        uses: actions/download-artifact@v8
        with:
          name: release-android-apk
          path: release-assets/android

      - name: 检查待发布资产
        run: |
          find release-assets -type f | sort

      - name: 创建或更新 GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.validate-tag.outputs.tag }}
        run: |
          shopt -s nullglob
          assets=(release-assets/windows/* release-assets/macos/* release-assets/android/*)

          if [ "${#assets[@]}" -eq 0 ]; then
            echo "未找到可发布资产"
            exit 1
          fi

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" "${assets[@]}" --clobber
          else
            gh release create "${TAG_NAME}" "${assets[@]}" \
              --title "NetMate ${TAG_NAME}" \
              --generate-notes \
              --verify-tag \
              --latest
          fi
